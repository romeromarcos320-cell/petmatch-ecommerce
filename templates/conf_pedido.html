<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>¡Compra Confirmada!</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #FAF4E8; 
            color: #4A3B32; 
            text-align: center; 
            padding: 80px 20px; 
        }
        .box { 
            background: white; 
            padding: 40px; 
            border-radius: 8px; 
            display: inline-block; 
            box-shadow: 0 4px 6px rgba(74, 59, 50, 0.1); 
            border: 1px solid #F2E8D9; 
            max-width: 500px; 
        }
        h1 { color: #D35400; margin-top: 0; }
        p { font-size: 1.1em; line-height: 1.6; color: #5C4D42; }
        .btn { 
            display: inline-block; 
            background: #E67E22; 
            color: white; 
            text-decoration: none; 
            padding: 10px 24px; 
            border-radius: 20px; 
            font-weight: bold; 
            margin-top: 25px; 
            transition: background 0.3s ease; 
        }
        .btn:hover { background: #BA4A00; }
        /* Estilo para la imagen de la caricatura */
        .img-feliz { 
            max-width: 100%; 
            width: 200px;    
            height: auto;    
            margin: 15px auto; 
            display: block; 
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>🐾 ¡Pedido Confirmado!</h1>

        <img src="https://cdn.pixabay.com/photo/2017/02/01/09/57/animal-2029284_1280.png" alt="Perrito Feliz" class="img-feliz">

        <p>Gracias por tu compra en PetMatch. Tu pedido ha sido registrado con éxito y el stock correspondiente ya fue descontado del catálogo.</p>
        <a href="/" class="btn">Volver a la tienda</a>
    </div>
</body>
</html>
