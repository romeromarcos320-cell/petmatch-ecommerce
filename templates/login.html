<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetMatch - Iniciar Sesión</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #FAF4E8; 
            color: #4A3B32; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .box { 
            background: white; 
            padding: 40px; 
            border-radius: 8px; 
            box-shadow: 0 4px 6px rgba(74, 59, 50, 0.1); 
            border: 1px solid #F2E8D9; 
            text-align: center; 
            max-width: 350px; 
            width: 100%; 
        }
        h2 { color: #D35400; margin-top: 0; margin-bottom: 25px; }
        input { 
            width: 100%; 
            padding: 10px; 
            margin-bottom: 15px; 
            border: 1px solid #F2E8D9; 
            border-radius: 4px; 
            box-sizing: border-box; 
            font-size: 1aem; 
            background-color: #FFFDF9; 
            color: #4A3B32; 
        }
        input:focus { outline: 2px solid #E67E22; }
        button { 
            width: 100%; 
            background: #E67E22; 
            color: white; 
            border: none; 
            padding: 12px; 
            border-radius: 20px; 
            font-weight: bold; 
            font-size: 1em; 
            cursor: pointer; 
            transition: background 0.3s ease; 
        }
        button:hover { background: #BA4A00; }
        p { margin-top: 20px; font-size: 0.9em; }
        a { color: #D35400; font-weight: bold; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Ingresar a PetMatch</h2>
        {% if error %}
            <p style="color: #C0392B; font-weight: bold; background: #FADBD8; padding: 10px; border-radius: 4px;">{{ error }}</p>
        {% endif %}
        <form method="POST">
            <input type="text" name="usuario" placeholder="Nombre de Usuario" required>
            <input type="password" name="clave" placeholder="Contraseña" required>
            <button type="submit">Ingresar</button>
        </form>
        <p>¿No tenés cuenta? <a href="/registro">Registrate acá</a></p>
        <p><a href="/" style="font-weight: normal; color: #7E6B5A;">Volver al catálogo</a></p>
    </div>
</body>
</html>
